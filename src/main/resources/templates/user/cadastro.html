<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sebo Digital</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-main">

    <div class="breadcrumb">
        <a th:href="@{/}">Home</a> | <a th:href="@{/login}">Faça Login</a> | Cadastro
    </div>

    <div class="auth-container">

        <div class="auth-icon"></div>

        <h1 class="auth-title">Cadastre-se</h1>

        <form th:action="@{/cadastro}" method="post" class="auth-form">

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">E-mail:*</label>
                    <input type="email" name="email" class="form-input" placeholder="Digite o e-mail" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirme seu E-mail:*</label>
                    <input type="email" class="form-input" placeholder="Confirme o e-mail cadastrado" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Senha:*</label>
                    <input type="password" name="password" class="form-input" placeholder="Crie sua senha" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirme sua senha:*</label>
                    <input type="password" class="form-input" placeholder="Repita a senha" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Data de nascimento:*</label>
                    <input type="text" name="dataNasc" class="form-input" placeholder="dd/mm/aaaa" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Estado onde reside:*</label>
                    <select name="estado" class="form-select" required>
                        <option value="" disabled selected>Escolha seu estado</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Cidade:*</label>
                    <input type="text" name="cidade" class="form-input" placeholder="Escolha sua cidade" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone:*</label>
                    <input type="tel" name="telefone" class="form-input" placeholder="Digite seu número" required>
                </div>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" required>
                    <span>Estou ciente e concordo com os <i>termos de uso</i></span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" required>
                    <span>Estou ciente e concordo com a <i>política de privacidade</i></span>
                </label>
            </div>

            <button type="submit" class="btn-auth">Finalizar Cadastro</button>

        </form>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
