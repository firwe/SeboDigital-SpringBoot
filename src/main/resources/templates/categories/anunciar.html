<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncie seu livro - Sebo Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/anunciar.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="anunciar-main">
    <div class="breadcrumb">
        <a th:href="@{/}">&larr; Voltar</a> | Anuncie seu livro!
    </div>

    <div class="anunciar-layout">
        <div class="upload-img-box">
            <div class="upload-img-x"></div>
            <div class="upload-img-btn">Adicione a foto aqui</div>
        </div>

        <div class="anunciar-form-area">
            <div class="tabs-container">
                <button type="button" class="tab-btn active" id="tab-livro">Livro</button>
                <button type="button" class="tab-btn" id="tab-colecao">Coleção</button>
            </div>

            <div class="form-box">
                <form th:action="@{/anunciar}" method="post">
                    <div class="form-row-3col">
                        <div class="input-group">
                            <label class="input-label">Título:*</label>
                            <input type="text" id="input-titulo" name="titulo" class="input-field" placeholder="Digite o título" required>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Autor:*</label>
                            <input type="text" name="autor" class="input-field" placeholder="Autor" required>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Editora:</label>
                            <input type="text" name="editora" class="input-field" placeholder="Editora">
                        </div>
                    </div>

                    <div class="form-row-2col">
                        <div class="form-col">
                            <div class="input-group">
                                <label class="input-label">Valor:*</label>
                                <input type="text" name="valor" class="input-field" placeholder="R$ 10,00" required>
                            </div>
                        </div>

                        <div class="form-col" style="flex-direction: row; gap: 30px;">
                            <div class="input-group" style="min-width: 180px;">
                                <label class="input-label">Categorias:*</label>
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                    <label class="radio-item"><input type="checkbox"> <span>Literatura Brasileira</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Literatura Estrangeira</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Romance</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Poesia</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Terror</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Mistério & Suspense</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Infanto Juvenil</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Mangás</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>HQs</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Autoajuda</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Idiomas</span></label>
                                    <label class="radio-item"><input type="checkbox" id="chk-desapega"> <span style="font-weight: bold; color: var(--color-accent);">Desapega Uni</span></label>
                                </div>
                            </div>

                            <div class="input-group" id="area-desapega" style="min-width: 180px; display: none;">
                                <label class="input-label">Áreas:*</label>
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                    <label class="radio-item"><input type="checkbox"> <span>Direito</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Letras</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Engenharia</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Medicina</span></label>
                                    <label class="radio-item"><input type="checkbox"> <span>Tecnologia</span></label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-laranja" id="btn-submit-anuncio">Anunciar</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tabLivro = document.getElementById('tab-livro');
        const tabColecao = document.getElementById('tab-colecao');
        const inputTitulo = document.getElementById('input-titulo');
        const btnSubmit = document.getElementById('btn-submit-anuncio');
        const chkDesapega = document.getElementById('chk-desapega');
        const areaDesapega = document.getElementById('area-desapega');

        tabLivro.addEventListener('click', () => {
            tabLivro.classList.add('active'); tabColecao.classList.remove('active');
            inputTitulo.placeholder = "Digite o título do livro";
            btnSubmit.innerText = "Anunciar livro";
        });

        tabColecao.addEventListener('click', () => {
            tabColecao.classList.add('active'); tabLivro.classList.remove('active');
            inputTitulo.placeholder = "Digite o título da coleção";
            btnSubmit.innerText = "Anunciar coleção";
        });

        chkDesapega.addEventListener('change', function() {
            areaDesapega.style.display = this.checked ? 'block' : 'none';
        });
    });
</script>
</body>
</html>
