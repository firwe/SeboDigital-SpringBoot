<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo - Sebo Digital</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/listagem.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="listagem-main">
    <div class="breadcrumb">
        <a th:href="@{/}">&larr; Voltar</a> | Explorar Acervo
    </div>

    <h1 class="listagem-titulo-topo">Veja o que temos em nosso acervo</h1>

    <div class="listagem-container">
        <aside class="sidebar-filtros">
            <h2 class="sidebar-titulo">Refine sua pesquisa aqui!</h2>
            <form th:action="@{/acervo}" method="get">
                <div class="filtro-group">
                    <label class="filtro-label">Título:</label>
                    <input type="text" name="titulo" class="filtro-input" placeholder="Digite o título do livro">
                </div>
                <button type="submit" class="btn-procurar">Procurar</button>
            </form>
        </aside>

        <div class="resultados-grid">
            <div th:if="${#lists.isEmpty(produtos)}" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #64748b; font-size: 18px;">
                <p>Nenhum livro foi cadastrado no acervo ainda.</p>
            </div>

            <div class="card-horizontal" th:each="livro : ${produtos}">

                <div class="card-horiz-img" style="overflow: hidden; display: flex; align-items: center; justify-content: center; background: #e2e8f0; border-right: 1px solid #f1f5f9;">
                    <img th:if="${livro.imagemBase64 != null}"
                         th:src="'data:image/jpeg;base64,' + ${livro.imagemBase64}"
                         style="width: 100%; height: 100%; object-fit: cover;">
                    <span th:unless="${livro.imagemBase64 != null}" style="font-size: 40px; color: #94a3b8;">📸</span>
                </div>

                <div class="card-horiz-info">
                    <span class="card-tag" th:text="'Acervo - ' + ${livro.categoria}">Acervo - Categoria</span>
                    <span class="card-titulo" th:text="${livro.titulo}">Título do Livro</span>
                    <span class="card-preco" th:text="'R$ ' + ${livro.preco}">R$ 00,00</span>
                    <span class="card-detalhe"><b>Autor:</b> <span th:text="${livro.autor}">Nome do Autor</span></span>
                    <span class="card-detalhe" th:if="${livro.dono != null}"><b>Vendido por:</b> <span th:text="${livro.dono.nome}">Nome do Vendedor</span></span>

                    <div style="display: flex; gap: 10px; margin-top: auto; padding-top: 15px; align-items: center;">
                        <a th:href="@{/produto/{id}(id=${livro.id_produto})}" class="btn-ver-mais" style="text-decoration: none; display: flex; align-items: center; justify-content: center; margin: 0;">Ver mais</a>

                        <div th:if="${session.usuarioLogado != null and ((livro.dono != null and livro.dono.id_usuario == session.usuarioLogado.id_usuario) or session.usuarioLogado.admin == true)}" style="display: flex; gap: 10px;">
                            <a th:href="@{/editar-produto/{id}(id=${livro.id_produto})}" style="background: #eab308; color: white; text-decoration: none; padding: 0 20px; height: 35px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-family: var(--font-body); font-size: 13px;">Editar</a>
                            <form th:action="@{/deletar-produto/{id}(id=${livro.id_produto})}" method="post" style="margin: 0;">
                                <button type="submit" style="background: #ef4444; color: white; border: none; padding: 0 20px; height: 35px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px;">Apagar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
