<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Sebo Digital</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/listagem.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="carrinho-main"> <div class="breadcrumb" style="margin-bottom: 30px;">
    <a th:href="@{/acervo}" style="text-decoration: none; color: inherit;">&larr; Continuar Comprando</a>
</div>

    <h1 class="listagem-titulo-topo" style="margin-bottom: 40px; font-size: 32px;">Meu Carrinho</h1>

    <div th:if="${#lists.isEmpty(itens)}" style="text-align: center; padding: 60px 0;">
        <h2 style="color: var(--color-muted);">Seu carrinho está vazio.</h2>
    </div>

    <div th:unless="${#lists.isEmpty(itens)}" class="carrinho-flex-container">

        <div class="carrinho-itens">
            <div th:each="item, iter : ${itens}" class="card-horizontal card-carrinho">

                <div class="card-horiz-img img-container-carrinho">
                    <img th:if="${item.imagemBase64 != null}"
                         th:src="|data:image/jpeg;base64,${item.imagemBase64}|"
                         style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div style="margin-left: 25px; flex: 1; display: flex; flex-direction: column;">
                    <span style="font-size: 13px; color: var(--color-muted);" th:text="${item.categoria}">Categoria</span>
                    <span style="font-family: var(--font-display); font-size: 26px; font-weight: 700; margin: 5px 0; line-height: 1.2;" th:text="${item.titulo}">Título</span>
                    <span style="color: var(--color-accent); font-weight: 700; font-size: 22px;" th:text="'R$ ' + ${#numbers.formatDecimal(item.preco, 1, 2, 'POINT')}"></span>

                    <div style="margin-top: 20px;">
                        <form th:action="@{/carrinho/remover}" method="post">
                            <input type="hidden" name="index" th:value="${iter.index}">
                            <button type="submit" style="color: #ff4d4d; font-size: 14px; font-weight: 600; background: none; border: none; cursor: pointer; text-decoration: underline;">Remover item</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <aside class="carrinho-resumo">
            <h2 style="font-family: var(--font-display); font-size: 28px; margin-bottom: 25px;">Resumo</h2>

            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px;">
                <span th:text="'Produtos (' + ${#lists.size(itens)} + ')'">Produtos</span>
                <span th:text="'R$ ' + ${#numbers.formatDecimal(total, 1, 2, 'POINT')}"></span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px;">
                <span>Frete</span>
                <span style="color: #22c55e; font-weight: 700;">Grátis</span>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
                <span style="font-size: 22px; font-weight: 700;">Total</span>
                <span style="font-size: 26px; font-weight: 700; color: var(--color-accent);" th:text="'R$ ' + ${#numbers.formatDecimal(total, 1, 2, 'POINT')}"></span>
            </div>

            <button class="nav-btn" style="width: 100%; background: var(--color-header); color: white; justify-content: center; padding: 18px; border-radius: 40px; border: none; cursor: pointer; font-size: 16px; font-weight: 700;">
                Finalizar Compra
            </button>
        </aside>

    </div>
</main>
