<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header class="header" th:fragment="header">
    <div class="header-top">
        <a th:href="@{/}" class="header-logo">
            <img th:src="@{/img/Trocafolha.png}" alt="Sebo Digital">
        </a>

        <form th:action="@{/acervo}" method="get" class="header-search">
            <input type="search" name="busca" placeholder="Busque por títulos, autores ou palavras-chave">
            <button type="submit" style="display:none;">Buscar</button> </form>

        <div class="header-actions">
            <a href="#" class="action-item">
                <div class="action-icon"><img th:src="@{/img/favoritos.png}" alt="Favoritos"></div>
                <span class="action-label">Favoritos</span>
            </a>

            <a th:href="@{/carrinho}" class="action-item">
                <div class="action-icon"><img th:src="@{/img/shopping_cart_PNG38.png}" alt="Carrinho"></div>
                <span class="action-label">Carrinho</span>
            </a>

            <a th:href="@{/login}" class="action-item" th:if="${session.usuarioLogado == null}">
                <div class="action-icon"><img th:src="@{/img/perfil.png}" alt="Login"></div>
                <span class="action-label">Faça Login</span>
            </a>

            <div class="action-item" th:if="${session.usuarioLogado != null}">
                <div class="action-icon"><img th:src="@{/img/perfil.png}" alt="Perfil"></div>
                <span class="action-label" th:text="${session.usuarioLogado.nome}">User Name</span>
                <a th:href="@{/logout}" class="logout-link">Sair</a>
            </div>
        </div>
    </div>

    <nav class="header-nav">
        <div class="dropdown">
            <button class="nav-btn">
                <div class="hamburger-icon"><span></span><span></span><span></span></div>
                Categorias
            </button>
            <div class="dropdown-content">
                <div class="dropdown-header">▲ Categorias</div>
                <a th:href="@{/acervo(categoria='Literatura Brasileira')}">Literatura Brasileira</a>
                <a th:href="@{/acervo(categoria='Literatura Estrangeira')}">Literatura Estrangeira</a>
                <a th:href="@{/acervo(categoria='Ficção')}">Ficção</a>
                <a th:href="@{/acervo(categoria='Romance')}">Romance</a>
                <a th:href="@{/acervo(categoria='Poesia')}">Poesia</a>
                <a th:href="@{/acervo(categoria='Terror')}">Terror</a>
                <a th:href="@{/acervo(categoria='Mistério & Suspense')}">Mistério & Suspense</a>
                <a th:href="@{/acervo(categoria='Infanto Juvenil')}">Infanto Juvenil</a>
                <a th:href="@{/acervo(categoria='Mangás')}">Mangás</a>
                <a th:href="@{/acervo(categoria='Autoajuda')}">Autoajuda</a>
                <a th:href="@{/acervo(categoria='Idiomas')}">Idiomas</a>
                <hr>
                <a th:href="@{/desapega}" style="font-weight: bold; color: #1e293b;">Desapega Uni</a>
            </div>
        </div>

        <a th:href="@{/acervo}" class="nav-btn">Explorar Acervo</a>
        <a th:href="@{/colecoes}" class="nav-btn">Coleções</a>
        <a th:href="@{/desapega}" class="nav-btn">Desapega Uni</a>
        <a th:href="@{/anunciar}" class="nav-btn">Anuncie seu livro!</a>
        <a th:href="@{/ajuda}" class="nav-btn">Precisa de ajuda?</a>
    </nav>
</header>

</body>
</html>
