<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sebo Digital</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}"> <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-main">
    <div class="auth-container" style="max-width: 800px;"> <div class="breadcrumb" style="align-self: flex-start; margin-bottom: 20px;">
        <a th:href="@{/}">Home</a> | <a th:href="@{/login}">Login</a> | Cadastro
    </div>

        <h1 class="auth-title">Crie sua conta</h1>
        <p style="text-align: center; margin-bottom: 30px; color: var(--color-muted);">Junte-se à nossa comunidade de leitores.</p>

        <form th:action="@{/usuarios/cadastrar}" method="post" class="auth-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%;">

                <div class="form-group">
                    <label class="form-label">Nome Completo:*</label>
                    <input type="text" name="nome" class="form-input" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label class="form-label">E-mail:*</label>
                    <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Senha:*</label>
                    <input type="password" name="senha" class="form-input" placeholder="No mínimo 6 caracteres" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirme a Senha:*</label>
                    <input type="password" class="form-input" placeholder="Repita a senha" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Telefone:*</label>
                    <input type="tel" name="telefone" class="form-input" placeholder="(00) 00000-0000" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Data de Nascimento:*</label>
                    <input type="date" name="dataNascimento" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Estado:*</label>
                    <select name="estado" class="form-input" style="appearance: auto;" required>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PR">Paraná</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Cidade:*</label>
                    <input type="text" name="cidade" class="form-input" placeholder="Sua cidade" required>
                </div>
            </div>

            <div class="checkbox-group" style="margin-top: 20px;">
                <label class="checkbox-item">
                    <input type="checkbox" required>
                    <span>Aceito os <u>termos de uso</u> e <u>privacidade</u></span>
                </label>
            </div>

            <form th:action="@{/usuarios/cadastrar}" method="post" class="auth-form">
                <button type="submit" class="btn-auth">Finalizar Cadastro</button>
            </form>
        </form>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
