<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Sebo Digital</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-main">
    <div class="auth-container">
        <div class="auth-tabs">
            <a th:href="@{/login}" class="auth-tab active">Login</a>
            <a th:href="@{/cadastro}" class="auth-tab">Cadastro</a>
        </div>

        <h1 class="auth-title">Bem-vindo de volta!</h1>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-input" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-auth">Entrar na conta</button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
