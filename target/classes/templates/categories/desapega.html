<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desapega Uni - Sebo Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/listagem.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="listagem-main">
    <div class="breadcrumb">
        <a th:href="@{/}">&larr; Voltar</a> | Desapega Uni
    </div>

    <h1 class="listagem-titulo-topo">Conhece a iniciativa Desapega Uni?</h1>
    <div class="listagem-container">
        <aside class="sidebar-filtros">
            <h2 class="sidebar-titulo">Refine sua pesquisa aqui!</h2>
            <form action="#">
                <button type="submit" class="btn-procurar">Procurar</button>
            </form>
        </aside>

        <div class="resultados-grid">
            <a th:href="@{/produto}" class="card-horizontal" style="text-decoration: none; color: inherit; display: flex;">
                <div class="card-horiz-img"></div>
                <div class="card-horiz-info">
                    <span class="card-tag">Desapega Uni - Pedagogia</span>
                    <span class="card-titulo">Título Universitário</span>
                    <span class="card-preco">R$00,00</span>
                    <span class="card-detalhe"><b>Autor:</b> Nome</span>
                    <div class="btn-detalhes" style="margin-top: 10px;">Ver mais</div>
                </div>
            </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
